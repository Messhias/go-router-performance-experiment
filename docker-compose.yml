services:
  llama-gemma:
    image: ghcr.io/ggml-org/llama.cpp:server
    pull_policy: always
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models:ro
    environment:
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_MODEL: /models/gemma-3-1b-it-Q4_K_M.gguf
      LLAMA_ARG_CTX_SIZE: "8192"

  llama-qwen:
    image: ghcr.io/ggml-org/llama.cpp:server
    pull_policy: always
    ports:
      - "8082:8080"
    volumes:
      - ./models:/models:ro
    environment:
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_MODEL: /models/qwen2.5-0.5b-instruct-q2_k.gguf
      LLAMA_ARG_CTX_SIZE: "8192"